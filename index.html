<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">

<title>業務チェック表</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0D3B6E;--navy-mid:#1C508A;--navy-light:#E8F0FA;
  --yellow:#F5C800;--yellow-light:#FFFBE6;
  --red:#E8192C;--white:#fff;--bg:#EEF3FA;--text:#1a1a1a;
}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;background:var(--bg);color:var(--text);font-size:14px;max-width:480px;margin:0 auto;min-height:100vh;}
.screen{display:none;} .screen.active{display:block;}

/* Header */
.header{position:sticky;top:0;z-index:100;background:var(--navy);padding:0.7rem 1rem;display:flex;align-items:center;gap:10px;}
.header-title{font-size:15px;font-weight:700;color:#fff;flex:1;}
.back-btn{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);border-radius:8px;padding:4px 10px;font-size:13px;cursor:pointer;color:#fff;font-family:inherit;}
.back-btn:active{background:rgba(255,255,255,.25);}

/* Tab bar */
.tab-bar{display:flex;background:var(--navy);overflow-x:auto;}
.tab{flex:1;white-space:nowrap;padding:0.65rem 0.4rem;text-align:center;font-size:12px;cursor:pointer;color:rgba(255,255,255,.6);border-bottom:3px solid transparent;}
.tab.active{color:var(--yellow);border-bottom-color:var(--yellow);font-weight:700;}

.content{padding:1rem;}

/* Staff grid */
.staff-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1rem;}
.staff-card{background:#fff;border:2px solid var(--navy-light);border-radius:16px;padding:1rem 0.75rem;text-align:center;cursor:pointer;transition:border-color .15s,transform .1s;}
.staff-card:active{border-color:var(--navy);transform:scale(.97);}
.avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;margin:0 auto 8px;}

/* Buttons */
.btn{padding:0.6rem 1rem;border:2px solid var(--navy-light);border-radius:10px;background:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--navy);}
.btn:active{background:var(--navy-light);}
.btn-navy{background:var(--navy);border-color:var(--navy);color:#fff;}
.btn-navy:active{background:var(--navy-mid);}
.btn-yellow{background:var(--yellow);border-color:var(--yellow);color:var(--navy);}
.btn-yellow:active{background:#e6b800;}
.btn-red{border-color:var(--red);color:var(--red);}

/* Category header */
.category-header{display:flex;align-items:center;justify-content:space-between;padding:0.6rem 0.85rem;background:var(--navy);border-radius:10px;cursor:pointer;margin-bottom:4px;}
.category-title{font-size:13px;font-weight:700;color:#fff;}

/* Task item */
.task-item{display:flex;align-items:center;gap:9px;padding:0.6rem 0.75rem;background:#fff;border-radius:10px;margin-bottom:3px;border:1.5px solid var(--navy-light);}
.task-item.task-done{background:var(--yellow-light);border-color:#F5C800;}
.check-circle{width:26px;height:26px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:14px;}
.check-circle.done{background:var(--navy);border-color:var(--navy);color:#fff;}
.task-label{flex:1;font-size:13px;line-height:1.4;}
.task-label.done-text{color:#aaa;text-decoration:line-through;}
.task-pts{font-size:11px;color:#aaa;flex-shrink:0;}

/* Progress */
.progress-bar{height:8px;background:#dde8f5;border-radius:4px;overflow:hidden;margin:4px 0;}
.progress-fill{height:100%;border-radius:4px;transition:width .3s;background:var(--yellow);}

/* Status */
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.dot-green{background:#16a34a;} .dot-yellow{background:#d97706;} .dot-red{background:var(--red);} .dot-gray{background:#ccc;}

/* Freq row */
.freq-row{display:flex;align-items:center;gap:8px;padding:0.6rem 0.85rem;background:#fff;border-radius:10px;margin-bottom:4px;border:1.5px solid var(--navy-light);}
.freq-name{flex:1;font-size:13px;line-height:1.3;}

/* Badges */
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.badge-daily{background:var(--yellow);color:var(--navy);}
.badge-weekly{background:var(--navy);color:#fff;}
.badge-biweekly{background:var(--navy-mid);color:#fff;}
.badge-monthly{background:var(--red);color:#fff;}
.badge-bimonthly{background:#7c3aed;color:#fff;}
.badge-asneeded{background:#e5e7eb;color:#374151;}
.badge-ok{background:#dcfce7;color:#166534;}
.badge-warn{background:#fef3c7;color:#92400e;}
.badge-overdue{background:#fee2e2;color:#991b1b;}

/* Log */
.log-row{display:flex;gap:10px;padding:0.6rem 0;border-bottom:1px solid var(--navy-light);}
.log-time{font-size:11px;color:#888;width:65px;flex-shrink:0;line-height:1.5;}
.log-content{flex:1;}
.log-task-name{font-size:13px;margin-bottom:3px;}
.log-sub{font-size:11px;color:#888;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-head{font-size:11px;color:#888;text-align:center;padding:3px 0;}
.cal-cell{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;cursor:pointer;position:relative;}
.cal-cell.has-data{background:var(--navy);color:#fff;font-weight:700;}
.cal-cell.today{outline:2px solid var(--yellow);outline-offset:-2px;}
.cal-cell.other{color:#ccc;}
.cal-dot{width:4px;height:4px;border-radius:50%;background:var(--yellow);position:absolute;bottom:3px;}

/* Bottom bar */
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:3px solid var(--navy);padding:0.75rem 1rem;display:flex;justify-content:space-between;align-items:center;z-index:50;}
.spacer-bottom{height:80px;}

/* Admin */
.admin-section{margin-bottom:1.5rem;}
.admin-section-title{font-size:11px;color:var(--navy-mid);font-weight:700;margin-bottom:8px;letter-spacing:.05em;text-transform:uppercase;}
.input-field{flex:1;padding:0.5rem 0.75rem;border:2px solid var(--navy-light);border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a1a;}
.input-field:focus{outline:none;border-color:var(--navy);}
.time-input{width:110px;padding:0.5rem 0.75rem;border:2px solid var(--navy-light);border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a1a;}
.staff-manage-row{display:flex;align-items:center;gap:8px;padding:0.65rem 0.85rem;background:#fff;border-radius:10px;margin-bottom:4px;border:1.5px solid var(--navy-light);}
.pin-display{letter-spacing:.5em;font-size:28px;font-weight:700;text-align:center;padding:1rem;color:var(--navy);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto;}
.pin-btn{padding:1rem;font-size:20px;border:2px solid var(--navy-light);border-radius:12px;background:#fff;cursor:pointer;font-family:inherit;color:var(--navy);font-weight:700;}
.pin-btn:active{background:var(--navy-light);}
.csv-drop{border:2px dashed var(--navy-mid);border-radius:12px;padding:1.5rem;text-align:center;background:var(--navy-light);cursor:pointer;}
.csv-drop:active{background:#dce8f5;}
.dow-label{font-size:13px;color:var(--navy);width:55px;font-weight:700;}
#qr-overlay{display:none;position:fixed;inset:0;background:#000;z-index:200;flex-direction:column;align-items:center;justify-content:center;}
#qr-overlay.active{display:flex;}
#qr-video{width:100%;max-width:480px;border-radius:12px;}
#qr-canvas{display:none;}
.qr-frame{position:absolute;width:200px;height:200px;border:3px solid:var(--yellow);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,.5);}
.qr-label{color:#fff;font-size:13px;margin-top:1.25rem;text-align:center;}
.av-sm{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;}
.section-card{background:#fff;border-radius:14px;padding:1rem;margin-bottom:10px;border:1.5px solid var(--navy-light);}
.task-item.task-overdue{border-color:var(--red);background:#fff5f5;}
.task-item.task-overdue .task-label{color:#991b1b;font-weight:700;}
.alert-banner{background:#fee2e2;border:2px solid var(--red);border-radius:10px;padding:0.6rem 0.85rem;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.alert-count{background:var(--red);color:#fff;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.assign-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;background:#e0f2fe;color:#075985;flex-shrink:0;}
.assign-badge.mine{background:#dcfce7;color:#166534;}
@media print{
  .no-print{display:none!important;}
  .print-only{display:block!important;}
  body{max-width:none;font-size:12px;}
  .monthly-report-table{width:100%;border-collapse:collapse;font-size:11px;}
  .monthly-report-table th,.monthly-report-table td{border:1px solid #ccc;padding:4px 6px;}
  .monthly-report-table th{background:#f0f0f0;}
}
.print-only{display:none;}

.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--navy);color:#fff;padding:0.85rem 1.5rem;border-radius:14px;font-size:14px;font-weight:700;z-index:300;text-align:center;max-width:280px;border:3px solid var(--yellow);}
</style>
<script>
(function(){
  const VER='20260406220000';
  const stored=localStorage.getItem('app_version');
  if(stored&&stored!==VER){
    localStorage.setItem('app_version',VER);
    location.reload(true);
  } else {
    localStorage.setItem('app_version',VER);
  }
})();
</script>

<body>

</div>

<!-- Screen: Login -->
<div id="screen-login" class="screen active">

      <div>

<!-- Screen: Check -->

</div>

<!-- Screen: Viewer -->

function load(){
  try{

// =========== DATE / BUSINESS DATE ===========
function fmtDate(d){return d.toISOString().slice(0,10);}
function getBizDate(now){
  now=now||new Date();
  const dow=now.getDay().toString();
  const cutoff=S.settings.cutoffTimes[dow];
  if(!cutoff)return fmtDate(now);
  const[h,m]=cutoff.split(':').map(Number);
  const nowMins=now.getHours()*60+now.getMinutes();
  if(nowMins<h*60+m){
    const p=new Date(now);p.setDate(p.getDate()-1);return fmtDate(p);
  }
  return fmtDate(now);
}
function daysDiff(a,b){
  return Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000);
}
function fmtDateJP(s){return s?s.replace(/-/g,'/'):'—';}

// =========== HELPERS ===========
function staffColor(n){const i=S.staff.indexOf(n);return COLORS[i>=0?i%COLORS.length:0];}
function staffInit(n){return n.slice(0,2);}
function avHtml(n,sz=32){
  const c=staffColor(n);
  return `<div class="av-sm" style="width:${sz}px;height:${sz}px;background:${c}22;color:${c};font-size:${Math.round(sz*.35)}px;">${staffInit(n)}</div>`;
}
function freqKey(f){return{毎日:'daily',週1回:'weekly','2週間に1回':'biweekly',月1回:'monthly','月2回(1日・15日)':'bimonthly',都度:'asneeded'}[f]||'asneeded';}
function freqDays(f){return{週1回:7,'2週間に1回':14,月1回:30,'月2回(1日・15日)':15}[f]||999;}

// =========== RECORD ACCESS ===========
function getLastComp(taskId){
  let ld=null,ls=null,lts=null;
  for(const[date,dr]of Object.entries(S.records)){
    for(const[staff,sr]of Object.entries(dr)){
      if(sr[taskId]?.completed){
        if(!ld||date>ld){ld=date;ls=staff;lts=sr[taskId].ts;}
      }
    }
  }
  return{date:ld,staff:ls,ts:lts};
}
function isDoneToday(taskId,bd){
  const dr=S.records[bd];
  if(!dr)return false;
  return S.staff.some(s=>dr[s]?.[taskId]?.completed);
}
function getTaskStatus(task){
  const bd=getBizDate();
  const last=getLastComp(task.id);
  if(task.frequency==='都度')return{status:'asneeded',last};
  if(task.frequency==='毎日'){
    return{status:isDoneToday(task.id,bd)?'ok':'warn',last};
  }
  if(task.frequency==='月2回(1日・15日)'){
    const day=parseInt(bd.slice(8));
    const ym=bd.slice(0,7);
    const windowStart=day>=15?`${ym}-15`:`${ym}-01`;
    if(last.date&&last.date>=windowStart)return{status:'ok',last};
    const diffFromStart=daysDiff(windowStart,bd);
    if(diffFromStart<=1)return{status:'warn',last};
    return{status:'overdue',last};
  }
  if(!last.date)return{status:'overdue',last};
  const diff=daysDiff(last.date,bd);
  const lim=freqDays(task.frequency);
  if(diff<=lim)return{status:'ok',last};
  if(diff<=lim+3)return{status:'warn',last};
  return{status:'overdue',last};
}
function setRec(bd,staff,taskId,val){
  if(!S.records[bd])S.records[bd]={};
  if(!S.records[bd][staff])S.records[bd][staff]={};
  S.records[bd][staff][taskId]=val;
}

// =========== OVERDUE HELPERS ===========
function getOverdueTasks(staffName){
  const bd=getBizDate();
  const sr=S.records[bd]?.[staffName]||{};
  return S.tasks.filter(task=>{
    // skip tasks not assigned to this staff (if assignment exists)
    const asgn=S.settings.taskAssignments[task.id];
    if(asgn&&asgn!==staffName)return false;
    if(sr[task.id]?.completed)return false;
    const {status}=getTaskStatus(task);
    return status==='overdue'||(task.frequency==='毎日'&&status==='warn');
  });
}

// =========== QR SCANNER ===========
let qrStream=null,qrTimer=null;

function openScanner(){
  if(!S.currentStaff){alert('先にスタッフを選択してください');return;}
  const ov=document.getElementById('qr-overlay');
  ov.style.display='flex';
  const video=document.getElementById('qr-video');
  const canvas=document.getElementById('qr-canvas');
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
    .then(stream=>{
      qrStream=stream;video.srcObject=stream;video.play();
      qrTimer=setInterval(()=>{
        if(video.readyState!==video.HAVE_ENOUGH_DATA)return;
        canvas.width=video.videoWidth;canvas.height=video.videoHeight;
        const ctx=canvas.getContext('2d');ctx.drawImage(video,0,0);
        const img=ctx.getImageData(0,0,canvas.width,canvas.height);
        if(typeof jsQR==='undefined')return;
        const code=jsQR(img.data,img.width,img.height);
        if(code)processQR(code.data);
      },300);
    })
    .catch(err=>{alert('カメラを起動できませんでした:\n'+err.message);closeScanner();});
}

function closeScanner(){
  document.getElementById('qr-overlay').style.display='none';
  if(qrTimer){clearInterval(qrTimer);qrTimer=null;}
  if(qrStream){qrStream.getTracks().forEach(t=>t.stop());qrStream=null;}
}

function processQR(data){
  if(!data.startsWith('TASK:'))return;
  const taskId=data.replace('TASK:','');
  const task=S.tasks.find(t=>t.id===taskId);
  if(!task)return;
  closeScanner();
  const bd=getBizDate();
  const cur=S.records[bd]?.[S.currentStaff]?.[taskId];
  if(cur?.completed){showToast(`「${task.name}」は完了済みです`);return;}
  setRec(bd,S.currentStaff,taskId,{completed:true,ts:new Date().toISOString()});
  save();renderCheck();
  showToast('✓ '+task.name);
}

function showToast(msg){
  const t=document.createElement('div');
  t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1800);
}

function buildFreqView(){
  var freqOrder=['毎日','月2回(1日・15日)','週1回','2週間に1回','月1回','都度'];
  var statusLabel={ok:'完了',warn:'要実施',overdue:'期限超過',asneeded:'随時'};
  var dotCls={ok:'dot-green',warn:'dot-yellow',overdue:'dot-red',asneeded:'dot-gray'};
  var badgeCls={ok:'badge-ok',warn:'badge-warn',overdue:'badge-overdue',asneeded:'badge-asneeded'};

  return freqOrder.map(function(freq){
    var tasks=S.tasks.filter(function(t){return t.frequency===freq;});
    if(!tasks.length)return'';
    var taskRows=tasks.map(function(task){
      var res=getTaskStatus(task);
      var status=res.status; var last=res.last;
      var meta=last.date?(last.staff+' / '+fmtDateJP(last.date)):'未実施';
      var asgn=S.settings.taskAssignments[task.id];
      var rowStyle=status==='overdue'?'border-color:var(--red);background:#fff5f5;':'';
      var asgnHtml=asgn?'<span class="assign-badge">👤'+asgn+'</span>':'';
      return '<div class="freq-row" style="'+rowStyle+'">'
        +'<div class="status-dot '+dotCls[status]+'"></div>'
        +'<span class="freq-name">'+task.name+'</span>'
        +'<div style="text-align:right;flex-shrink:0;">'
        +'<div style="display:flex;align-items:center;gap:4px;justify-content:flex-end;flex-wrap:wrap;">'
        +asgnHtml
        +'<span class="badge '+badgeCls[status]+'">'+statusLabel[status]+'</span>'
        +'</div>'
        +'<div style="font-size:10px;color:#aaa;margin-top:2px;">'+meta+'</div>'
        +'</div></div>';
    }).join('');
    return '<div style="margin-bottom:1.25rem;">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">'
      +'<div style="background:var(--navy);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;">'+freq+'</div>'
      +'</div>'+taskRows+'</div>';
  }).join('');
}

function buildLogView(){
  const entries=[];
  for(const[date,dr]of Object.entries(S.records)){
    for(const[staff,sr]of Object.entries(dr)){
      for(const[tid,rec]of Object.entries(sr)){
        if(rec?.completed){
          const task=S.tasks.find(t=>t.id===tid);
          entries.push({date,staff,task,ts:rec.ts});
        }
      }
    }
  }
  entries.sort((a,b)=>(b.ts||b.date)>(a.ts||a.date)?1:-1);
  if(!entries.length)return'<div style="text-align:center;color:#aaa;padding:2rem 0;font-size:13px;">記録がありません</div>';

  let curDate=null;
  return entries.slice(0,200).map(({date,staff,task,ts})=>{
    if(!task)return'';
    const dh=date!==curDate?`<div style="font-size:12px;font-weight:700;color:#555;margin:1rem 0 6px;padding-top:6px;border-top:1px solid #eee;">${fmtDateJP(date)}</div>`:'';
    curDate=date;
    const tStr=ts?new Date(ts).toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}):'';
    return`${dh}<div class="log-row">
      <div class="log-time">${tStr}</div>
      <div class="log-content">
        <div class="log-task-name">${task.name}</div>
        <div class="log-sub">${avHtml(staff,18)}<span>${staff}</span><span class="badge badge-${freqKey(task.frequency)}">${task.frequency}</span></div>
      </div>
      <div style="font-size:12px;color:#1a6644;font-weight:700;flex-shrink:0;">${task.points}pt</div>
    </div>`;
  }).join('');
}

function buildCalView(){
  const now=new Date();
  const y=now.getFullYear(),mo=now.getMonth();
  const firstDow=new Date(y,mo,1).getDay();
  const dim=new Date(y,mo+1,0).getDate();
  const prefix=`${y}-${String(mo+1).padStart(2,'0')}`;
  const compMap={};
  for(const[date,dr]of Object.entries(S.records)){
    if(!date.startsWith(prefix))continue;
    const d=parseInt(date.slice(8));
    let has=false;
    for(const sr of Object.values(dr)){if(Object.values(sr).some(r=>r?.completed)){has=true;break;}}
    if(has)compMap[d]=true;
  }
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push('<div></div>');
  const today=now.getDate();
  for(let d=1;d<=dim;d++){
    const ds=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=d===today;
    const hasDat=!!compMap[d];
    cells.push(`<div class="cal-cell ${hasDat?'has-data':''} ${isToday?'today':''}" data-caldate="${ds}">${d}${hasDat?'<div class="cal-dot"></div>':''}</div>`);
  }
  return`<div style="font-size:13px;font-weight:700;margin-bottom:1rem;">${y}年${mo+1}月</div>
    <div class="cal-grid">
      ${['日','月','火','水','木','金','土'].map(d=>`<div class="cal-head" style="${d==='日'?'color:#dc2626':d==='土'?'color:#1e40af':''}">${d}</div>`).join('')}
      ${cells.join('')}
    </div>
    <div id="cal-detail" style="margin-top:1.25rem;"></div>`;
}

function attachCalClick(){
  document.querySelectorAll('.cal-cell[data-caldate]').forEach(el=>{
    el.addEventListener('click',()=>showCalDay(el.getAttribute('data-caldate')));

}

          <div style="text-align:right;">
            <div style="font-size:24px;font-weight:700;color:var(--navy);">${row.total.toFixed(1)}</div>
            <div style="font-size:11px;color:#888;">合計pt</div>
          </div>
        </div>
        <div style="height:8px;background:var(--navy-light);border-radius:4px;overflow:hidden;margin-bottom:6px;">
          <div style="height:100%;width:${pct}%;background:${i===0?'var(--yellow)':'var(--navy)'};border-radius:4px;transition:width .4s;"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:#888;">
          <span>1日平均: <b style="color:var(--navy);">${row.avg.toFixed(1)}pt</b></span>
          <span>${pct}%</span>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

function genQrCodes(){
  if(typeof QRCode==='undefined'){
    setTimeout(genQrCodes,300);return;
  }
  S.tasks.forEach(task=>{
    const el=document.getElementById('qr-'+task.id);
    if(!el)return;
    el.innerHTML='';
    try{
      new QRCode(el,{
        text:'TASK:'+task.id,
        width:80,height:80,
        colorDark:'#0D3B6E',colorLight:'#ffffff',
        correctLevel:QRCode.CorrectLevel.M
      });
    }catch(e){console.warn('QR error:',task.id,e);}
  });
}

function addStaff(){
  const inp=document.getElementById('new-staff-inp');

  if(S.staff.includes(name))return alert('すでに登録されています');

function deleteStaff(name){
  if(!confirm(`「${name}」を削除しますか？\n過去の記録は残ります。`))return;
  S.staff=S.staff.filter(s=>s!==name);save();renderAdmin();
}
function changePin(){
  const inp=document.getElementById('new-pin-inp');
  const pin=inp?.value?.trim();
  if(!/^\d{4}$/.test(pin))return alert('4桁の数字で入力してください');
  S.settings.adminPin=pin;inp.value='';save();alert('PINを変更しました');
}
function updateCutoff(dow,val){
  S.settings.cutoffTimes[dow.toString()]=val;save();
}
function importCsv(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const lines=e.target.result.split(/\r?\n/).filter(l=>l.trim());
      const validFreqs=['毎日','週1回','2週間に1回','月1回','月2回(1日・15日)','都度'];
      const newTasks=[];const errors=[];
      lines.forEach((line,idx)=>{
        const p=line.split(',').map(s=>s.trim().replace(/^"|"$/g,''));
        if(p.length<4){errors.push(`行${idx+1}: 列数不足`);return;}
        const[name,category,frequency,ptsStr]=p;
        const points=parseFloat(ptsStr);
        if(!name){errors.push(`行${idx+1}: 業務名なし`);return;}
        if(!validFreqs.includes(frequency)){errors.push(`行${idx+1}: 頻度「${frequency}」無効`);return;}
        if(isNaN(points)){errors.push(`行${idx+1}: ポイント無効`);return;}
        const id='csv_'+name.replace(/\s/g,'_').slice(0,15)+'_'+idx;
        newTasks.push({id,name,category,frequency,points});
      });
      if(!newTasks.length){
        document.getElementById('csv-result').innerHTML=`<div style="color:#dc2626;font-size:12px;">取込失敗: 有効行なし<br>${errors.join('<br>')}</div>`;return;
      }
      S.tasks=newTasks;save();
      document.getElementById('csv-result').innerHTML=`<div style="color:#1a6644;font-size:12px;font-weight:700;">${newTasks.length}件取り込みました</div>${errors.length?`<div style="color:#888;font-size:11px;margin-top:3px;">${errors.length}件スキップ</div>`:''}`;
      setTimeout(()=>renderAdmin(),600);
    }catch(err){
      document.getElementById('csv-result').innerHTML=`<div style="color:#dc2626;font-size:12px;">エラー: ${err.message}</div>`;
    }
  };
  reader.readAsText(file,'UTF-8');
}
function downloadCsv(){
  const bom='\uFEFF';
  const rows=S.tasks.map(t=>[`"${t.name}"`,`"${t.category}"`,`"${t.frequency}"`,t.points].join(','));
  const csv=bom+rows.join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  const now=new Date();
  const ds=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  a.download=`業務リスト_${ds}.csv`;
  a.click();URL.revokeObjectURL(url);
}
function resetDefault(){

  S.tasks=[...DEFAULT_TASKS];save();renderAdmin();

  const now=new Date();
  const curY=now.getFullYear();
  const curM=now.getMonth()+1;
  // Build last 12 months options
  const months=[];
  for(let i=0;i<12;i++){
    let m=curM-i;let y=curY;
    if(m<=0){m+=12;y--;}
    months.push({y,m});
  }
  const selId=`exp-ym-sel`;
  return`<div class="admin-section">
    <div class="admin-section-title">月次レポート エクスポート</div>
    <p style="font-size:12px;color:#888;margin-bottom:1rem;line-height:1.6;">対象月を選んでCSVダウンロード・印刷用PDFを出力できます。</p>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;">
      <span style="font-size:13px;font-weight:700;color:var(--navy);">対象月：</span>
      <select id="${selId}" style="flex:1;padding:0.5rem 0.75rem;border:2px solid var(--navy-light);border-radius:8px;font-size:13px;font-family:inherit;background:#fff;color:var(--navy);">
        ${months.map(({y,m})=>`<option value="${y}-${String(m).padStart(2,'0')}">${y}年${m}月</option>`).join('')}
      </select>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button class="btn btn-navy" style="width:100%;font-size:14px;padding:0.75rem;" onclick="downloadMonthCsv(document.getElementById('${selId}').value)">⬇ CSVダウンロード（実績ログ）</button>
      <button class="btn" style="width:100%;font-size:14px;padding:0.75rem;background:var(--navy-light);border-color:var(--navy-light);color:var(--navy);" onclick="printMonthReport(document.getElementById('${selId}').value)">🖨 印刷用PDF（月次サマリー）</button>
    </div>
  </div>
  <div id="exp-preview"></div>`;
}

function downloadMonthCsv(ym){
  const entries=[];
  for(const[date,dr]of Object.entries(S.records)){
    if(!date.startsWith(ym))continue;
    for(const[staff,sr]of Object.entries(dr)){
      for(const[tid,rec]of Object.entries(sr)){
        if(rec?.completed){
          const task=S.tasks.find(t=>t.id===tid);
          if(task)entries.push({date,staff,task,ts:rec.ts});
        }
      }
    }
  }
  entries.sort((a,b)=>(a.date>b.date?1:a.date<b.date?-1:0));
  if(!entries.length){alert(`${ym} の記録はありません`);return;}
  const bom='\uFEFF';
  const header='日付,スタッフ,業務名,カテゴリ,頻度,ポイント,完了時刻';
  const rows=entries.map(({date,staff,task,ts})=>{
    const tStr=ts?new Date(ts).toLocaleString('ja-JP'):'';
    return[date,staff,`"${task.name}"`,task.category,task.frequency,task.points,`"${tStr}"`].join(',');
  });
  const csv=bom+header+'\r\n'+rows.join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`業務実績_${ym}.csv`;a.click();URL.revokeObjectURL(url);
}

function printMonthReport(ym){
  const [y,m]=ym.split('-').map(Number);
  // Collect data
  const staffTotals={};
  S.staff.forEach(s=>staffTotals[s]={pts:0,cnt:0});
  const taskRows=[];
  const dailyMap={};// date→{staff→pts}

  for(const[date,dr]of Object.entries(S.records)){
    if(!date.startsWith(ym))continue;
    for(const[staff,sr]of Object.entries(dr)){
      if(!staffTotals[staff])staffTotals[staff]={pts:0,cnt:0};
      for(const[tid,rec]of Object.entries(sr)){
        if(rec?.completed){
          const task=S.tasks.find(t=>t.id===tid);
          if(!task)continue;
          staffTotals[staff].pts+=task.points;
          staffTotals[staff].cnt++;
          taskRows.push({date,staff,task,ts:rec.ts});
          if(!dailyMap[date])dailyMap[date]={};
          if(!dailyMap[date][staff])dailyMap[date][staff]=0;
          dailyMap[date][staff]+=task.points;
        }
      }
    }
  }

  const dates=Object.keys(dailyMap).sort();
  const printWin=window.open('','_blank','width=900,height=700');
  if(!printWin)return alert('ポップアップを許可してください');
  printWin.document.write(`<!DOCTYPE html><html lang="ja"><head>
  <meta charset="UTF-8"><title>業務月次レポート ${y}年${m}月</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:12px;color:#111;padding:20px;}
    h1{font-size:18px;margin-bottom:4px;color:#0D3B6E;}
    .sub{font-size:11px;color:#888;margin-bottom:20px;}
    h2{font-size:13px;font-weight:700;margin:20px 0 8px;color:#0D3B6E;border-bottom:2px solid #0D3B6E;padding-bottom:4px;}
    table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:16px;}
    th{background:#0D3B6E;color:#fff;padding:6px 8px;text-align:left;}
    td{padding:5px 8px;border-bottom:1px solid #ddd;}
    tr:nth-child(even){background:#f5f8ff;}
    .pts{text-align:right;font-weight:700;color:#0D3B6E;}
    @media print{body{padding:0;}button{display:none!important;}}
  </style></head><body>
  <button onclick="window.print()" style="margin-bottom:16px;padding:8px 20px;background:#0D3B6E;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;">🖨 印刷する</button>
  <h1>業務月次レポート ${y}年${m}月</h1>
  <div class="sub">わくわく学童保育 ／ 出力日時: ${new Date().toLocaleString('ja-JP')}</div>

  <h2>スタッフ別集計</h2>
  <table><tr><th>スタッフ</th><th>完了件数</th><th class="pts" style="text-align:right;">合計ポイント</th></tr>
  ${S.staff.map(s=>`<tr><td>${s}</td><td>${staffTotals[s]?.cnt||0}件</td><td class="pts">${(staffTotals[s]?.pts||0).toFixed(1)}pt</td></tr>`).join('')}
  </table>

  <h2>日別スタッフポイント</h2>
  <table>
    <tr><th>日付</th>${S.staff.map(s=>`<th>${s}</th>`).join('')}</tr>
    ${dates.map(d=>`<tr><td>${d.slice(5).replace('-','/')}</td>${S.staff.map(s=>`<td class="pts">${dailyMap[d]?.[s]?dailyMap[d][s].toFixed(1)+'pt':'—'}</td>`).join('')}</tr>`).join('')}
  </table>

  <h2>実績詳細ログ（${taskRows.length}件）</h2>
  <table><tr><th>日付</th><th>スタッフ</th><th>業務名</th><th>カテゴリ</th><th>頻度</th><th class="pts" style="text-align:right;">pt</th></tr>
  ${taskRows.sort((a,b)=>a.date>b.date?1:-1).map(({date,staff,task})=>`
    <tr><td>${date.slice(5).replace('-','/')}</td><td>${staff}</td><td>${task.name}</td><td>${task.category}</td><td>${task.frequency}</td><td class="pts">${task.points}</td></tr>`).join('')}
  </table>
  </body></html>`);
  printWin.document.close();
}
